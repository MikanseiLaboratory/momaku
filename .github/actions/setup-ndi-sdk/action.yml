name: Setup NDI SDK (vendored)
description: >
  Sets NDI_SDK_DIR to third_party/ndi-sdk-6 only (no downloads, no secrets). On Linux, recreates
  libndi.so symlinks for grafton-ndi. Refresh the tree with scripts/vendor-ndi-sdk-from-local.ps1.
inputs:
  platform:
    description: "linux | macos | windows"
    required: true

runs:
  using: composite
  steps:
    - name: NDI SDK (Windows)
      if: inputs.platform == 'windows'
      shell: pwsh
      run: pwsh -NoProfile -File "${{ github.action_path }}/setup-vendored.ps1"

    - name: NDI SDK (Linux / macOS)
      if: inputs.platform != 'windows'
      shell: bash
      run: bash "${{ github.action_path }}/setup-vendored.sh"
