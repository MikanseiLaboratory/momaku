name: Setup NDI SDK
description: >
  Resolves NDI 6 SDK for CI builds. Linux follows DistroAV libndi-get.sh (downloads.ndi.tv).
  macOS/Windows try official URLs first; set NDI_SDK_MACOS_URL / NDI_SDK_WINDOWS_URL if downloads are blocked.
inputs:
  platform:
    description: "linux | macos | windows"
    required: true
  linux_url:
    description: Optional override for Linux SDK tarball URL
    required: false
    default: ""
  macos_url:
    description: Optional override for macOS SDK archive URL (.tar.gz)
    required: false
    default: ""
  windows_url:
    description: Optional override for Windows SDK archive URL (.zip with include/ + lib/)
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: NDI SDK (Linux)
      if: inputs.platform == 'linux'
      shell: bash
      env:
        NDI_SDK_LINUX_URL: ${{ inputs.linux_url }}
      run: bash "${{ github.action_path }}/install-linux.sh"

    - name: NDI SDK (macOS)
      if: inputs.platform == 'macos'
      shell: bash
      env:
        NDI_SDK_MACOS_URL: ${{ inputs.macos_url }}
      run: bash "${{ github.action_path }}/install-macos.sh"

    - name: NDI SDK (Windows)
      if: inputs.platform == 'windows'
      shell: pwsh
      env:
        NDI_SDK_WINDOWS_URL: ${{ inputs.windows_url }}
      run: |
        & "${{ github.action_path }}/install-windows.ps1"
