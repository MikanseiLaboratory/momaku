name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            ndi: windows
            tauri_args: "--verbose --config bundle-with-updater.conf.json"
            include_updater_json: "true"
          - runner: macos-15
            ndi: macos
            tauri_args: "--verbose --config bundle-with-updater.conf.json --config bundle-release-macos.json"
            include_updater_json: "false"
          - runner: macos-13
            ndi: macos
            tauri_args: "--verbose --config bundle-with-updater.conf.json --config bundle-release-macos.json"
            include_updater_json: "false"
          - runner: ubuntu-24.04
            ndi: linux
            tauri_args: "--verbose --config bundle-with-updater.conf.json --config bundle-release-linux.json"
            include_updater_json: "false"

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88

      - name: Linux — build dependencies (Tauri / GTK / WebKit)
        if: matrix.ndi == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config clang libssl-dev curl wget file \
            libgtk-3-dev libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            libxdo-dev libfuse2

      - name: macOS — LLVM (bindgen)
        if: matrix.ndi == 'macos'
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> "$GITHUB_ENV"

      - name: MSVC (mozangle / Servo)
        if: matrix.ndi == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install LLVM (bindgen / grafton-ndi) — Windows
        if: matrix.ndi == 'windows'
        run: choco install llvm -y --no-progress

      - name: Add LLVM to PATH — Windows
        if: matrix.ndi == 'windows'
        shell: pwsh
        run: |
          $llvm = "C:\Program Files\LLVM\bin"
          if (Test-Path $llvm) { Add-Content $env:GITHUB_PATH $llvm }

      - name: Bindgen / libclang env for MSVC includes — Windows
        if: matrix.ndi == 'windows'
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (Test-Path (Join-Path $llvmBin "libclang.dll")) {
            "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
          if ($env:INCLUDE) {
            $parts = $env:INCLUDE -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ -and (Test-Path $_) }
            if ($parts.Count -gt 0) {
              $clangArgs = ($parts | ForEach-Object { "-isystem `"$_`"" }) -join ' '
              "BINDGEN_EXTRA_CLANG_ARGS=$clangArgs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          }

      - name: Setup NDI SDK
        uses: ./.github/actions/setup-ndi-sdk
        with:
          platform: ${{ matrix.ndi }}
          linux_url: ${{ secrets.NDI_SDK_LINUX_URL }}
          macos_url: ${{ secrets.NDI_SDK_MACOS_URL }}
          windows_url: ${{ secrets.NDI_SDK_WINDOWS_URL }}

      - run: npm ci

      - name: Require TAURI_SIGNING_PRIVATE_KEY
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::Set repository secret TAURI_SIGNING_PRIVATE_KEY (minisign private key, same pair as pubkey in tauri.conf.json)."
            exit 1
          fi

      - uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: src-tauri
          tagName: ${{ github.ref_name }}
          releaseName: "momaku ${{ github.ref_name }}"
          releaseBody: |
            Signed installers for **Windows**, **macOS** (Apple Silicon + Intel), and **Ubuntu** (deb + AppImage).
            The **latest.json** updater artifact is uploaded from the Windows matrix row only (single-platform updater JSON).
            Linux NDI SDK is fetched automatically in CI (same pattern as [DistroAV `CI/libndi-get.sh`](https://github.com/DistroAV/DistroAV/blob/master/CI/libndi-get.sh)). If macOS/Windows downloads from `downloads.ndi.tv` fail on the runner, set optional secrets **NDI_SDK_MACOS_URL** / **NDI_SDK_WINDOWS_URL** (direct archive URLs).
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: ${{ matrix.include_updater_json == 'true' }}
          args: ${{ matrix.tauri_args }}
