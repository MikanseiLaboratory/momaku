name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88
          components: rustfmt

      - name: rustfmt
        run: cargo fmt --all -- --check

  test:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Typecheck and Vite build
        run: npm run build

  build:
    runs-on: windows-latest
    needs: test
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88
          components: clippy

      - name: MSVC (mozangle / Servo)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install LLVM (bindgen / grafton-ndi)
        run: choco install llvm -y --no-progress

      - name: Add LLVM to PATH
        shell: pwsh
        run: |
          $llvm = "C:\Program Files\LLVM\bin"
          if (Test-Path $llvm) { Add-Content $env:GITHUB_PATH $llvm }

      # scripts/_tauri-windows-env.ps1 と同様（mozangle bindgen が MSVC ヘッダを正しく解釈するため）
      - name: Bindgen / libclang env for MSVC includes
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (Test-Path (Join-Path $llvmBin "libclang.dll")) {
            "LIBCLANG_PATH=$llvmBin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          }
          if ($env:INCLUDE) {
            $parts = $env:INCLUDE -split ';' | ForEach-Object { $_.Trim() } | Where-Object { $_ -and (Test-Path $_) }
            if ($parts.Count -gt 0) {
              $clangArgs = ($parts | ForEach-Object { "-isystem `"$_`"" }) -join ' '
              "BINDGEN_EXTRA_CLANG_ARGS=$clangArgs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          }

      - run: npm ci

      - name: Detect NDI SDK
        id: ndi
        shell: pwsh
        run: |
          $ndi = Join-Path ${env:ProgramFiles} "NDI\NDI 6 SDK"
          if (Test-Path $ndi) {
            "has_ndi=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "NDI SDK found at $ndi"
          } else {
            "has_ndi=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
            Write-Host "::warning::NDI 6 SDK not found. Install from https://ndi.video/type/developer/ for native Windows CI."
          }

      - name: cargo test
        if: steps.ndi.outputs.has_ndi == 'true'
        run: cargo test -p momaku --locked

      - name: cargo clippy
        if: steps.ndi.outputs.has_ndi == 'true'
        run: cargo clippy -p momaku --all-targets --all-features --locked -- -D warnings

      - name: cargo build (release)
        if: steps.ndi.outputs.has_ndi == 'true'
        run: cargo build -p momaku --release --locked

      - name: Skip native build without NDI SDK
        if: steps.ndi.outputs.has_ndi != 'true'
        run: echo "Skipping cargo test/build without NDI SDK on this runner."
